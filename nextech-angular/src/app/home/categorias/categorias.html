<section id="categorias" class="categorias">
  <div class="container-nx">
    <div class="section-head">
      <p class="eyebrow">Categorias</p>
      <h2 class="section-title">O que você procura?</h2>
    </div>

    <div class="cat-grid">
      @for (categoria of categorias; track categoria.titulo) {
        <a [href]="'#' + categoria.ancora" class="cat-card">
          <img [src]="categoria.imagem" [alt]="categoria.titulo" />
          <div class="cat-overlay"></div>
          <div class="cat-body">
            <span class="cat-tag">{{ categoria.tag }}</span>
            <h3>{{ categoria.titulo }}</h3>
            <p>{{ categoria.descricao }}</p>
          </div>
        </a>
      }
    </div>
  </div>
</section>
