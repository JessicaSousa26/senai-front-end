<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — NexTech</title>
<meta name="description" content="Acesse sua conta NexTech para acompanhar pedidos e ofertas exclusivas do mundo gamer.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrap">
  <img class="hero-bg" src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=1600&h=1200&fit=crop&auto=format" alt="PC Gamer com iluminação RGB">
  <div class="hero-overlay"></div>

  <div class="login-box">
    <a href="index.html" class="voltar-site">&larr; Voltar ao site</a>

    <a href="index.html" class="nx-logo">
      <span class="nx-logo-mark"></span>
      <span class="nx-logo-text">NEXTECH<span>.</span></span>
    </a>

    <h1>Bem-vindo de volta</h1>
    <p class="login-lead">Entre para acompanhar pedidos e ofertas exclusivas do mundo gamer.</p>

    <div id="loginAlerta" class="alerta-sucesso"></div>

    <form id="loginForm" class="login-form" novalidate>
      <div>
        <label class="form-label-nx" for="loginEmail">E-mail</label>
        <input type="text" id="loginEmail" class="form-nx-input" placeholder="seu@email.com" style="width:100%;padding:12px 14px;background-color:#141424;border:1px solid #1E1E38;color:#F0F0F8;font-size:14px;outline:none;font-family:'Inter',sans-serif;">
        <span class="erro-campo" id="erroLoginEmail"></span>
      </div>

      <div>
        <label class="form-label-nx" for="loginSenha">Senha</label>
        <div class="password-field">
          <input type="password" id="loginSenha" placeholder="Sua senha" style="width:100%;padding:12px 14px;background-color:#141424;border:1px solid #1E1E38;color:#F0F0F8;font-size:14px;outline:none;font-family:'Inter',sans-serif;">
          <button type="button" id="togglePassword">Mostrar</button>
        </div>
        <span class="erro-campo" id="erroLoginSenha"></span>
      </div>

      <div class="login-row">
        <label class="checkbox-nx">
          <input type="checkbox" id="lembrarMe">
          Lembrar-me
        </label>
        <a href="#">Esqueci minha senha</a>
      </div>

      <button type="submit" class="btn-nx btn-nx-primary btn-login">Entrar</button>
    </form>

    <p class="login-footer">Ainda não tem conta? <a href="#">Cadastre-se</a></p>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/login.js"></script>
</body>
</html>
